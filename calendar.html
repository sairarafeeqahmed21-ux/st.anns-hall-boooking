<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St.Anns Halls Calendar</title>
<!-- 🔥 LOGO & FAVICON -->
<link rel="icon" type="image/png" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="apple-touch-icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="shortcut icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
.fc {
  --fc-border-color: #e2e8f0;
  --fc-daygrid-event-border-color: #e2e8f0;
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  margin: 0 24px;
}
.fc-toolbar { margin-bottom: 28px; }
.fc-toolbar-title { font-size: 24px; font-weight: 700; color: #1e293b; }
.fc-button {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #64748b;
  border-radius: 10px;
  padding: 10px 18px;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.3s ease;
}
.fc-button:hover { background: #f1f5f9; transform: translateY(-1px); }
.fc-button-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-color: #3b82f6;
  color: white;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}
.fc-button-primary:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  transform: translateY(-2px);
}
.fc-prev-button, .fc-next-button, .fc-today-button, .fc-button-group .fc-button {
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
  border-color: #14b8a6 !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3) !important;
}
.fc-prev-button:hover, .fc-next-button:hover, .fc-today-button:hover, .fc-button-group .fc-button:hover {
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%) !important;
  transform: translateY(-2px) !important;
}
.fc-daygrid-day {
  border: 1px solid #f1f5f9;
  border-radius: 12px;
  margin: 2px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  height: 100px;
  padding-bottom: 8px;
  cursor: pointer;
}
.fc-daygrid-day:hover {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}
.fc-daygrid-day-top {
  font-weight: 600;
  color: #64748b;
  font-size: 14px;
  padding: 8px;
  position: relative;
  z-index: 2;
}
.fc-daygrid-day-future .fc-daygrid-day-top {
  font-weight: 700;
  color: #475569;
}
.fc-daygrid-day-future::after {
  content: '+';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: #10b981;
  pointer-events: none;
  z-index: 3;
  line-height: 1;
}
.fc-daygrid-day-past { background: #f8fafc; opacity: 0.6; cursor: not-allowed; }
.fc-day-today {
  background: transparent !important;
  position: relative;
  border-radius: 12px !important;
}
.fc-day-today .fc-daygrid-day-number {
  position: relative;
  z-index: 4;
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
  color: white !important;
  font-weight: 700 !important;
  font-size: 13px !important;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px auto 0;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
}
/* 🔥 RED DOT FOR ANY EVENTS - CLICKABLE */
.has-events::after {
  content: '';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 14px;
  height: 14px;
  background: #ef4444;
  border: 2px solid #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4);
  z-index: 10;
  animation: pulse 2s infinite;
  cursor: pointer;
  transition: all 0.2s ease;
}
.has-events:hover::after {
  transform: scale(1.2);
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.6);
}
@keyframes pulse {
  0% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
  50% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.7); }
  100% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
}
/* 🔥 HIDE EVENTS - ONLY SHOW DOT */
.fc-event { display: none !important; }
.fc-scrollgrid { border: none !important; }
.fc-event-time { 
  display: none !important; 
  visibility: hidden !important; 
  font-size: 0 !important; 
  height: 0 !important; 
  width: 0 !important; 
  opacity: 0 !important; 
}
/* Tooltip for booked dates */
.fc-daygrid-day:has(.has-events)::before {
  content: attr(data-tooltip);
  position: absolute;
  bottom: -35px;
  left: 50%;
  transform: translateX(-50%);
  background: #ef4444;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 0.3s ease;
}
.fc-daygrid-day:has(.has-events):hover::before {
  opacity: 1;
}
</style>
</head>

<body class="bg-gray-50">
<!-- HEADER -->
<header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="index.html#home" class="flex items-center gap-3 hover:scale-105 transition-transform">
    <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
         alt="CampusHalls Logo" 
         class="w-10 h-10 rounded-xl shadow-lg object-cover"
         loading="lazy">
    <h1 class="text-lg font-semibold text-gray-900">St.Anns Halls</h1>
  </a>
  <nav class="space-x-6 text-gray-600 font-medium text-sm">
    <a href="index.html#home" class="hover:text-green-600 font-semibold transition-colors">Home</a>
    <a href="index.html#availability" class="hover:text-green-600 font-semibold transition-colors">Availability</a>
  </nav>
</header>

<!-- MAIN CONTENT -->
<div class="w-full">
  <div class="bg-white px-8 py-6 border-b">
    <a href="index.html#availability" class="text-sm text-green-600 hover:text-green-700 font-medium mb-2 inline-block transition-colors flex items-center gap-1">
      ← Back to Halls
    </a>
    <h2 class="text-2xl font-semibold" id="hallTitle">Deickmann Hall</h2>
    <p class="text-gray-500 text-sm mt-1" id="hallInfo">Capacity: 200 seats • Click FREE dates to book | Click 🔴 RED DOT for slot details (9AM-3PM)</p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 rounded-full bg-green-100 text-green-600 text-xs flex items-center gap-1">+ Available</span>
      <span class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs flex items-center gap-1">🔴 Click Red Dot</span>
    </div>
  </div>

  <div class="bg-white px-4 md:px-8 py-8">
    <div id="calendar"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="bg-gradient-to-r from-green-500 to-teal-500 text-white text-center py-8 mt-20">
    <div class="max-w-4xl mx-auto px-4">
      <div class="flex justify-center items-center gap-3 mb-4">
        <div class="footer-logo">
          <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
               alt="St.Anns Logo" 
               class="w-12 h-12 rounded-2xl shadow-lg object-cover"
               loading="lazy">
        </div>
        <h3 class="font-bold text-2xl">St.Anns Halls</h3>
      </div>
      <p class="text-sm opacity-90">© 2026 St.Anns Halls. All rights reserved.</p>
    </div>
  </footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1VE0YP88fk7tJ-NynBt_A0dNnoMyVi44",
  authDomain: "hall-booking-de99d.firebaseapp.com",
  projectId: "hall-booking-de99d",
  storageBucket: "hall-booking-de99d.firebasestorage.app",
  messagingSenderId: "1077560501819",
  appId: "1:1077560501819:web:a57337c0cb22859d869e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 TIME SLOTS (9AM-3PM)
const TIME_SLOTS = [
  { start: '9:00 AM', end: '10:30 AM' },
  { start: '10:30 AM', end: '12:00 PM' },
  { start: '12:00 PM', end: '1:30 PM' },
  { start: '1:30 PM', end: '3:00 PM' }
];

document.addEventListener('DOMContentLoaded', function () {
  const urlParams = new URLSearchParams(window.location.search);
  let hallName = urlParams.get('hall');

  if (!hallName) {
    alert("❌ No hall selected.");
    window.location.href = "index.html#availability";
    return;
  }

  hallName = decodeURIComponent(hallName).trim();

  const validHalls = ["Deickmann Hall", "Gnanamma Hall", "St.Joseph's Auditorium"];
  if (!validHalls.includes(hallName)) {
    alert("❌ Invalid hall.");
    window.location.href = "index.html#availability";
    return;
  }

  const hallConfig = {
    "Deickmann Hall": { capacity: "200 seats", emoji: "📚" },
    "Gnanamma Hall": { capacity: "200 seats", emoji: "📖" },
    "St.Joseph's Auditorium": { capacity: "800 seats", emoji: "🎭" }
  };

  const config = hallConfig[hallName];
  document.getElementById('hallTitle').textContent = `${config.emoji} ${hallName}`;
  document.getElementById('hallInfo').textContent = `Capacity: ${config.capacity} • Click FREE dates to book | Click 🔴 RED DOT for slot details (9AM-3PM)`;

  let calendar;

  const calendarEl = document.getElementById('calendar');
  
  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: "auto",
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,dayGridWeek'
    },
    timeZone: 'UTC',
    eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
    dayMaxEvents: 99, // Allow all events
    dayPopoverFormat: { month: 'long', day: 'numeric', year: 'numeric' },
    eventDidMount: function(info) {
      // Hide all events - we only show red dot
      info.el.style.display = 'none';
      info.el.title = info.event.title;
    },
    dateClick: function(info) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const clickedDate = new Date(info.dateStr);
      clickedDate.setHours(0,0,0,0);

      if (clickedDate < today) {
        alert("❌ Cannot book past dates");
        return;
      }

      // Get all events for this date
      const eventsOnDate = calendar.getEvents().filter(e =>
        e.start.toDateString() === clickedDate.toDateString()
      );

      if (eventsOnDate.length > 0) {
        showSlotDetails(clickedDate, eventsOnDate, hallName);
        return;
      }

      // No events = fully available
      const formattedDate = info.dateStr.replace(/-/g, '/');
      window.location.href = `registration.html?hall=${encodeURIComponent(hallName)}&date=${formattedDate}`;
    }
  });

  calendar.render();

  const q = query(collection(db, "bookings"), where("hall", "==", hallName));
  
  onSnapshot(q, (snapshot) => {
    calendar.removeAllEvents();

    snapshot.forEach((doc) => {
      const data = doc.data();
      if (!data.date || !data.eventName || !data.startTime) return;

      let eventDate = new Date(data.date.replace(/\//g, '-'));
      if (isNaN(eventDate)) return;

      calendar.addEvent({
        id: doc.id,
        title: data.eventName,
        start: eventDate,
        display: 'auto',
        extendedProps: {
          time: `${data.startTime} - ${data.endTime || '3PM'}`,
          startTime: data.startTime,
          endTime: data.endTime
        }
      });
    });
  });

  // 🔥 Add click listener for red dots
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('fc-daygrid-day') && e.target.classList.contains('has-events')) {
      e.stopPropagation();
      const dateStr = e.target.querySelector('.fc-daygrid-day-frame')?.dataset.date;
      if (dateStr) {
        const clickedDate = new Date(dateStr);
        const eventsOnDate = calendar.getEvents().filter(event =>
          event.start.toDateString() === clickedDate.toDateString()
        );
        showSlotDetails(clickedDate, eventsOnDate, hallName);
      }
    }
  });
});

// 🔥 SHOW DETAILED SLOT INFORMATION
function showSlotDetails(date, eventsOnDate, hallName) {
  const dateStr = date.toLocaleDateString('en-US', { 
    weekday: 'long', 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric' 
  });
  
  let bookedSlots = [];
  eventsOnDate.forEach(event => {
    bookedSlots.push({
      time: event.extendedProps.time || `${event.extendedProps.startTime} - ${event.extendedProps.endTime}`,
      name: event.title
    });
  });

  let availableSlots = TIME_SLOTS.filter(slot => {
    return !bookedSlots.some(booking => 
      booking.time.includes(slot.start.split(' ')[0]) || 
      booking.time.includes(slot.start)
    );
  });

  let message = `📅 ${dateStr}\n\n`;
  
  if (bookedSlots.length > 0) {
    message += `🔴 BOOKED SLOTS (${bookedSlots.length}/4):\n`;
    bookedSlots.forEach((booking, index) => {
      message += `• ${booking.time} - ${booking.name}\n`;
    });
    message += `\n`;
  }

  if (availableSlots.length > 0) {
    message += `✅ AVAILABLE SLOTS (${availableSlots.length}/4):\n`;
    availableSlots.forEach(slot => {
      message += `• ${slot.start} - ${slot.end}\n`;
    });
  } else {
    message += `❌ No available slots today (9AM-3PM)`;
  }

  message += `\n\nBook available slot?`;

  if (confirm(message)) {
    if (availableSlots.length > 0) {
      // Show slot selection dialog
      let slotChoice = prompt(`Select available slot (enter number):\n\n` + 
        availableSlots.map((slot, i) => `${i+1}. ${slot.start} - ${slot.end}`).join('\n') +
        `\n\nEnter slot number (1-${availableSlots.length}):`);
      
      if (slotChoice && !isNaN(slotChoice) && slotChoice >= 1 && slotChoice <= availableSlots.length) {
        const selectedSlot = availableSlots[parseInt(slotChoice) - 1];
        const formattedDate = date.toLocaleDateString('en-US').replace(/,/g, '');
        window.location.href = `registration.html?hall=${encodeURIComponent(hallName)}&date=${formattedDate}&slot=${encodeURIComponent(selectedSlot.start)}`;
      }
    } else {
      alert("No available slots today!");
    }
  }
}
</script>
</body>
</html>
