<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Halls</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.fc {
  --fc-border-color: #e2e8f0;
  --fc-daygrid-event-border-color: #e2e8f0;
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  margin: 0 24px;
}

.fc-toolbar { margin-bottom: 28px; }
.fc-toolbar-title { font-size: 24px; font-weight: 700; color: #1e293b; }

.fc-button {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #64748b;
  border-radius: 10px;
  padding: 10px 18px;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.3s ease;
}
.fc-button:hover { background: #f1f5f9; transform: translateY(-1px); }

.fc-button-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-color: #3b82f6;
  color: white;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}
.fc-button-primary:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  transform: translateY(-2px);
}

/* FOOTER COLOR FOR CALENDAR BUTTONS */
.fc-prev-button,
.fc-next-button,
.fc-today-button,
.fc-button-group .fc-button {
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
  border-color: #14b8a6 !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3) !important;
}

.fc-prev-button:hover,
.fc-next-button:hover,
.fc-today-button:hover,
.fc-button-group .fc-button:hover {
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%) !important;
  transform: translateY(-2px) !important;
}

.fc-daygrid-day {
  border: 1px solid #f1f5f9;
  border-radius: 12px;
  margin: 2px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: visible;
  padding-bottom: 8px;
}
.fc-daygrid-day:hover {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}

.fc-daygrid-day-top {
  font-weight: 600;
  color: #64748b;
  font-size: 14px;
  padding: 8px;
  position: relative;
  z-index: 2;
}

/* FUTURE DATES - Bold + Original color */
.fc-daygrid-day-future .fc-daygrid-day-top {
  font-weight: 700;
  color: #475569;
}

/* PLUS SIGN - Bigger, perfectly centered, bottom of cell */
.fc-daygrid-day-future::after {
  content: '+';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: #10b981;
  pointer-events: none;
  z-index: 3;
  line-height: 1;
}

.fc-daygrid-day-past {
  background: #f8fafc;
  opacity: 0.6;
}

/* TODAY - Clean green circle with visible number */
.fc-day-today {
  background: transparent !important;
  position: relative;
  border-radius: 12px !important;
}

.fc-day-today .fc-daygrid-day-number {
  position: relative;
  z-index: 4;
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
  color: white !important;
  font-weight: 700 !important;
  font-size: 13px !important;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px auto 0;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
}

/* RED DOT FOR BOOKED DATES */
.has-events::after {
  content: '';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: #ef4444;
  border: 2px solid #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4);
  z-index: 10;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
  50% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.7); }
  100% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
}

/* HIDE EVENTS - ONLY SHOW RED DOTS */
.fc-event {
  display: none !important;
}

.fc-scrollgrid { border: none !important; }
</style>
</head>

<body class="bg-gray-50">
<!-- HEADER -->
<header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="hallbooking.html#home" class="flex items-center gap-3 hover:scale-105 transition-transform">
    <div class="w-10 h-10 bg-gradient-to-r from-green-500 to-teal-500 rounded-xl shadow-lg"></div>
    <h1 class="text-lg font-semibold text-gray-900">CampusHalls</h1>
  </a>
  <nav class="space-x-6 text-gray-600 font-medium text-sm">
    <a href="hallbooking.html#home" class="hover:text-green-600 font-semibold transition-colors">Home</a>
    <a href="hallbooking.html#availability" class="hover:text-green-600 font-semibold transition-colors">Availability</a>
  </nav>
</header>

<!-- MAIN CONTENT -->
<div class="w-full">
  <div class="bg-white px-8 py-6 border-b">
    <a href="hallbooking.html#availability" class="text-sm text-green-600 hover:text-green-700 font-medium mb-2 inline-block transition-colors flex items-center gap-1">
      ← Back to Halls
    </a>
    <h2 class="text-2xl font-semibold" id="hallTitle">Seminar Hall 1</h2>
    <p class="text-gray-500 text-sm mt-1" id="hallInfo">Capacity: 80 seats • Click a date to book (today onwards)</p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 rounded-full bg-green-100 text-green-600 text-xs">Available</span>
      <span class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs">Booked 🔴</span>
    </div>
  </div>

  <div class="bg-white px-4 md:px-8 py-8">
    <div id="calendar"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="bg-gradient-to-r from-teal-500 to-green-500 text-white text-center py-8 mt-6">
  <div class="font-semibold">CampusHalls</div>
  <p class="text-sm opacity-90 mt-1">© 2026 CampusHalls. All rights reserved.</p>
  <div class="mt-4 text-sm space-x-6">
    <a href="hallbooking.html#home" class="hover:text-white/90 transition-colors">Home</a>
    <a href="hallbooking.html#availability" class="hover:text-white/90 transition-colors">Availability</a>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // Get hall from URL
  const urlParams = new URLSearchParams(window.location.search);
  const hallName = urlParams.get('hall') || 'Seminar Hall 1';
  
  document.getElementById('hallTitle').textContent = hallName;
  document.getElementById('hallInfo').textContent = `Capacity: 80 seats • Click a date to book (today onwards)`;

  var calendarEl = document.getElementById('calendar');
  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    timeFormat: '',
    height: "auto",
    aspectRatio: 1.8,
    dayMaxEvents: true,
    dayMaxEventRows: 4,
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridWeek,dayGridMonth'
    },
    events: [
      // Empty - no example events
    ],
    dayCellClassNames: function(arg) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const cellDate = new Date(arg.date);
      cellDate.setHours(0, 0, 0, 0);
      
      if (cellDate < today) {
        return ['fc-daygrid-day-past'];
      } else {
        return ['fc-daygrid-day-future'];
      }
    },
    dayCellDidMount: function(info) {
      const eventsOnDate = calendar.getEvents().filter(event => 
        event.start.toISOString().split('T')[0] === info.date.toISOString().split('T')[0]
      );
      if (eventsOnDate.length > 0) {
        info.el.classList.add('has-events');
      }
    },
    dateClick: function(info) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const clickedDate = new Date(info.dateStr);
      clickedDate.setHours(0, 0, 0, 0);
      
      // Block past dates
      if (clickedDate < today) {
        alert(`📅 ${info.dateStr}\n\n❌ Past date - cannot book`);
        return;
      }
      
      const eventsOnDate = calendar.getEvents().filter(event => 
        event.start.toISOString().split('T')[0] === info.dateStr
      );
      
      if (eventsOnDate.length > 0) {
        const eventList = eventsOnDate.map(e => `• ${e.title}`).join('\n');
        alert(`📅 ${info.dateStr}\n\n🔴 Booked Events:\n${eventList}`);
      } else {
        // 🚀 CONNECT TO REGISTRATION FORM
        const formattedDate = info.dateStr.replace(/-/g, '/'); // YYYY/MM/DD format
        const registrationUrl = `registration.html?hall=${encodeURIComponent(hallName)}&date=${formattedDate}`;
        window.location.href = registrationUrl;
      }
    }
  });
  calendar.render();
});
</script>
</body>
</html>
