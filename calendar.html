<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St.Anns Halls Calendar</title>
<!-- 🔥 LOGO & FAVICON -->
<link rel="icon" type="image/png" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="apple-touch-icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="shortcut icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
.fc {
  --fc-border-color: #e2e8f0;
  --fc-daygrid-event-border-color: #e2e8f0;
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  margin: 0 24px;
}
.fc-toolbar { margin-bottom: 28px; }
.fc-toolbar-title { font-size: 24px; font-weight: 700; color: #1e293b; }
.fc-button {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #64748b;
  border-radius: 10px;
  padding: 10px 18px;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.3s ease;
}
.fc-button:hover { background: #f1f5f9; transform: translateY(-1px); }
.fc-button-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-color: #3b82f6;
  color: white;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}
.fc-button-primary:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  transform: translateY(-2px);
}
.fc-prev-button, .fc-next-button, .fc-today-button, .fc-button-group .fc-button {
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
  border-color: #14b8a6 !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3) !important;
}
.fc-prev-button:hover, .fc-next-button:hover, .fc-today-button:hover, .fc-button-group .fc-button:hover {
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%) !important;
  transform: translateY(-2px) !important;
}
.fc-daygrid-day {
  border: 1px solid #f1f5f9;
  border-radius: 12px;
  margin: 2px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: visible;
  padding-bottom: 8px;
}
.fc-daygrid-day:hover {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}
.fc-daygrid-day-top {
  font-weight: 600;
  color: #64748b;
  font-size: 14px;
  padding: 8px;
  position: relative;
  z-index: 2;
}
.fc-daygrid-day-future .fc-daygrid-day-top {
  font-weight: 700;
  color: #475569;
}
.fc-daygrid-day-future::after {
  content: '+';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: #10b981;
  pointer-events: none;
  z-index: 3;
  line-height: 1;
}
.fc-daygrid-day-past { background: #f8fafc; opacity: 0.6; }
.fc-day-today {
  background: transparent !important;
  position: relative;
  border-radius: 12px !important;
}
.fc-day-today .fc-daygrid-day-number {
  position: relative;
  z-index: 4;
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
  color: white !important;
  font-weight: 700 !important;
  font-size: 13px !important;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px auto 0;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
}
.has-events::after {
  content: '';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 12px;
  height: 12px;
  background: #ef4444;
  border: 2px solid #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4);
  z-index: 10;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
  50% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.7); }
  100% { box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4); }
}
.fc-event { 
  display: none !important; 
  cursor: pointer !important;
}
.fc-scrollgrid { border: none !important; }
.fc-daygrid-event {
  display: block !important;
  font-size: 11px !important;
  padding: 2px 6px !important;
  margin: 1px !important;
  background: linear-gradient(135deg, #ef4444, #dc2626) !important;
  color: white !important;
  border: none !important;
  border-radius: 6px !important;
  font-weight: 600 !important;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3) !important;
  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;
  max-width: calc(100% - 4px) !important;
}
.fc-daygrid-event:hover {
  transform: scale(1.05) !important;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.5) !important;
}
  /* 🔥 PERMANENTLY KILL 5:30 TIME BUG */
.fc-event-time { 
  display: none !important; 
  visibility: hidden !important; 
  font-size: 0 !important; 
  height: 0 !important; 
  width: 0 !important; 
  opacity: 0 !important; 
}

.fc-event-title-container .fc-event-title {
  display: block !important;
}

.fc-daygrid-event .fc-event-main {
  padding: 2px 6px !important;
  font-size: 11px !important;
}

/* Kill any time display completely */
.fc-event-main-frame {
  display: flex !important;
  flex-direction: column !important;
}

.fc-event-title {
  margin: 0 !important;
  line-height: 1.2 !important;
}
</style>
</head>

<body class="bg-gray-50">
<!-- HEADER -->
<header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="index.html#home" class="flex items-center gap-3 hover:scale-105 transition-transform">
    <!-- 🔥 ACTUAL LOGO IMAGE INSTEAD OF COLORED DIV -->
    <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
         alt="CampusHalls Logo" 
         class="w-10 h-10 rounded-xl shadow-lg object-cover"
         loading="lazy">
    <h1 class="text-lg font-semibold text-gray-900">St.Anns Halls</h1>
  </a>
  <nav class="space-x-6 text-gray-600 font-medium text-sm">
    <a href="index.html#home" class="hover:text-green-600 font-semibold transition-colors">Home</a>
    <a href="index.html#availability" class="hover:text-green-600 font-semibold transition-colors">Availability</a>
  </nav>
</header>

<!-- MAIN CONTENT -->
<div class="w-full">
  <div class="bg-white px-8 py-6 border-b">
    <a href="index.html#availability" class="text-sm text-green-600 hover:text-green-700 font-medium mb-2 inline-block transition-colors flex items-center gap-1">
      ← Back to Halls
    </a>
    <h2 class="text-2xl font-semibold" id="hallTitle">Deickmann Hall</h2>
    <p class="text-gray-500 text-sm mt-1" id="hallInfo">Capacity: 200 seats • Click FREE dates to book | Click BOOKED events to view details</p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 rounded-full bg-green-100 text-green-600 text-xs flex items-center gap-1">+ Available</span>
      <span class="px-3 py-1 rounded-full bg-red-100 text-red-600 text-xs flex items-center gap-1">🔴 Booked</span>
    </div>
  </div>

  <div class="bg-white px-4 md:px-8 py-8">
    <div id="calendar"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="bg-gradient-to-r from-teal-500 to-green-500 text-white text-center py-8 mt-6">
  <div class="font-semibold">CampusHalls</div>
  <p class="text-sm opacity-90 mt-1">© 2026 CampusHalls. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1VE0YP88fk7tJ-NynBt_A0dNnoMyVi44",
  authDomain: "hall-booking-de99d.firebaseapp.com",
  projectId: "hall-booking-de99d",
  storageBucket: "hall-booking-de99d.firebasestorage.app",
  messagingSenderId: "1077560501819",
  appId: "1:1077560501819:web:a57337c0cb22859d869e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.addEventListener('DOMContentLoaded', function () {
  const urlParams = new URLSearchParams(window.location.search);
  let hallName = urlParams.get('hall');

  if (!hallName) {
    alert("❌ No hall selected.");
    window.location.href = "index.html#availability";
    return;
  }

  hallName = decodeURIComponent(hallName).trim();

  // 🔥 UPDATED HALL NAMES & CAPACITIES
  const validHalls = ["Deickmann Hall", "Gnanamma Hall", "St.Joseph's auditorium"];
  if (!validHalls.includes(hallName)) {
    alert("❌ Invalid hall.");
    window.location.href = "index.html#availability";
    return;
  }

  // 🔥 UPDATED HALL CONFIG WITH NEW CAPACITIES
  const hallConfig = {
    "Deickmann Hall": { capacity: "200 seats", emoji: "📚" },
    "Gnanamma Hall": { capacity: "200 seats", emoji: "📖" },
    "St.Joseph's auditorium": { capacity: "800 seats", emoji: "🎭" }
  };

  const config = hallConfig[hallName];
  document.getElementById('hallTitle').textContent = `${config.emoji} ${hallName}`;
  document.getElementById('hallInfo').textContent = `Capacity: ${config.capacity} • Click FREE dates to book | Click BOOKED events to view details`;

  let calendar;

  const calendarEl = document.getElementById('calendar');
  
  // 🔥 INIT CALENDAR FIRST - NO TIME DISPLAY
  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: "auto",
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,dayGridWeek'
    },
    timeZone: 'UTC', // 🔥 FIX TIME BUG
    eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false }, // 🔥 HIDE TIME
    dayMaxEvents: 3,
    eventClick: function(info) {
  const eventName = info.event.title;
  
  // 🔥 FIX AM/PM - WORKS WITH ANY FORMAT
  let startTime = info.event.extendedProps.time || info.event.extendedProps.startTime || "All Day";
  let endTime = info.event.extendedProps.endTime || "";
  
  // 🔥 CONVERT TO PROPER AM/PM
  const formatTime = (timeStr) => {
    if (!timeStr || timeStr.includes('AM') || timeStr.includes('PM')) return timeStr;
    
    try {
      const [hours, minutes] = timeStr.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes) || 0, 0, 0);
      return date.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit', 
        hour12: true 
      });
    } catch(e) {
      return timeStr;
    }
  };
  
  startTime = formatTime(startTime);
  endTime = formatTime(endTime);
  
  const timeRange = endTime ? `${startTime} - ${endTime}` : startTime;
  
  alert(`🔴 BOOKED\n\n📋 Event: ${eventName}\n🕐 Time: ${timeRange}`);
},
    dateClick: function(info) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const clickedDate = new Date(info.dateStr);
      clickedDate.setHours(0,0,0,0);

      if (clickedDate < today) {
        alert("❌ Cannot book past dates");
        return;
      }

      const eventsOnDate = calendar.getEvents().filter(e =>
        e.start.toDateString() === clickedDate.toDateString()
      );

      if (eventsOnDate.length > 0) {
        alert("🔴 Already booked! Click event for details.");
        return;
      }

      const formattedDate = info.dateStr.replace(/-/g, '/');
      window.location.href = `registration.html?hall=${encodeURIComponent(hallName)}&date=${formattedDate}`;
    },
    eventDidMount: function(info) {
      // 🔥 NUKE ANY TIME DISPLAY
      const timeEl = info.el.querySelector('.fc-event-time');
      if (timeEl) timeEl.remove();
      
      info.el.style.cursor = 'pointer';
      info.el.title = info.event.title;
    }
  });

  calendar.render();

  // 🔥 LOAD EVENTS AFTER CALENDAR RENDERS
  const q = query(collection(db, "bookings"), where("hall", "==", hallName));
  
  onSnapshot(q, (snapshot) => {
    calendar.removeAllEvents();

    snapshot.forEach((doc) => {
      const data = doc.data();
      if (!data.date || !data.eventName) return;

      let eventDate = new Date(data.date.replace(/\//g, '-'));
      if (isNaN(eventDate)) return;

     calendar.addEvent({
  id: doc.id,
  title: data.eventName, // ✅ ONLY NAME
  start: eventDate,
  display: 'auto',
  extendedProps: {
    time: data.startTime || "All Day",     // 🔥 ADD THIS LINE
    startTime: data.startTime || "All Day",
    endTime: data.endTime || ""
  }
});
  
    });
  });
});
</script>
</body>
</html>
